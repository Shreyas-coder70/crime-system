{% extends 'base.html' %}

{% block content %}

<h2>Search Records</h2>

<!-- 🔍 SEARCH FORM -->
<form method="POST">
    <input name="keyword" placeholder="Search name">
    <button>Search</button>
</form>

<br>

<!-- 📊 RESULT TABLE -->
<table>
<tr>
    <th>Name</th>
    <th>Age</th>
    <th>Gender</th>
    <th>Address</th>
    <th>Photo</th>
</tr>

{% for row in results %}
<tr>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td><img src="/static/uploads/{{ row[6] }}" width="60"></td>
</tr>
{% endfor %}
</table>

{% endblock %}
