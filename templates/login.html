<!DOCTYPE html>
<html>
<head>
    <title>Crime System</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
        }

        .box {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            margin: 10px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background: #2a5298;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Crime Record Management System</h2>

    <form action="/login" method="POST">
    <input name="username" placeholder="Username">
    <input name="password" type="password" placeholder="Password">
    <button>Login</button>
</form>
</div>

</body>
</html>
