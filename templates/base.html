<!DOCTYPE html>
<html>
<head>
    <title>Crime System</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #1e3c72, #2a5298);
            position: fixed;
            color: white;
        }

        .sidebar h2 {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar a {
            display: block;
            padding: 14px 20px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
            padding-left: 25px;
        }

        /* Topbar */
        .topbar {
            margin-left: 240px;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Main */
        .main {
            margin-left: 240px;
            padding: 20px;
        }

        /* Cards */
        .card {
    display: inline-block;
    width: 180px;      /* smaller width */
    padding: 15px;     /* less padding */
    margin: 8px;
    border-radius: 10px;
    font-size: 14px;
}

        .blue { background: #3498db; }
        .orange { background: #f39c12; }
        .green { background: #2ecc71; }

        /* Forms */
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #2a5298;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #2a5298;
            color: white;
        }
        .form-box {
    background: white;
    width: 450px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.form-box h2 {
    background: #2a5298;
    color: white;
    padding: 10px;
    border-radius: 6px;
}

input[type="text"],
input[type="date"],
input[type="file"],
select,
textarea {
    width: 100%;
}
/* 🚨 FORCE FIX FOR RADIO BUTTONS */
input[type="radio"] {
    width: auto !important;
    display: inline-block !important;
}
.radio-group label {
    display: inline-flex !important;
    align-items: center;
    gap: 8px;
}
.radio-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.radio-group label {
    display: flex;
    align-items: center;
    gap: 8px;
     /* ⭐ IMPORTANT FIX */
}

    </style>
</head>

<body>

<div class="sidebar">
    <h2>🚔 Crime System</h2>
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/fir">📝 FIR</a>
    <a href="/criminal">👤 Criminal</a>
    <a href="/case">📁 Case</a>
    <a href="/victim">👥 Victim</a>
    <a href="/search">🔍 Search</a>
    <a href="/reports">📄 Reports</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="topbar">
    <h3>Admin Panel</h3>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
